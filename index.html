        const DataGrid = ({ title, columns, data, onAdd, onEdit, onDelete }) => {
          const [searchQuery, setSearchQuery] = useState('');
          const [currentPage, setCurrentPage] = useState(1);
          const itemsPerPage = 5;

          const filteredData = useMemo(() => {
            if (!data) return [];
            return data.filter(item => 
              Object.values(item).some(val => {
                if (val === null || val === undefined) return false;
                return String(val).toLowerCase().includes(searchQuery.toLowerCase());
              })
            );
          }, [data, searchQuery]);

          const totalPages = Math.ceil(filteredData.length / itemsPerPage);

        const AdminDataGuru = ({ onBack }) => {
          const [guruList, setGuruList] = useState([]);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);

          // Efek untuk mengambil data dari Firebase secara realtime
          useEffect(() => {
            let unsubscribe;
            try {
              const db = window.firebaseDb;
              if (!db) throw new Error("Koneksi Firebase belum siap.");
              
              // Listener snapshot realtime ke koleksi 'guru'
              unsubscribe = db.collection('guru').onSnapshot(
                (snapshot) => {
                  const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                  setGuruList(data);
                  setLoading(false);
                  setError(null); // Clear error jika sukses
                },
                (err) => {
                  console.error("Firebase Snapshot Error:", err);
                  // Menangkap error khas Firestore seperti permission denied
                  if (err.code === 'permission-denied') {
                      setError("Akses ditolak. Pastikan Rules Firestore Anda diatur ke 'allow read, write: if true;' selama tahap testing.");
                  } else {
                      setError("Gagal memuat data dari database: " + err.message);
                  }
                  setLoading(false);
                }
              );
            } catch (err) {
              console.error(err);
              setError(err.message);
              setLoading(false);
            }
            
            // Cleanup listener saat komponen dibongkar (mencegah memory leak / bug)
            return () => {
              if (unsubscribe) unsubscribe();
            };
          }, []);

          // Fungsi Hapus yang terkoneksi ke Firebase dengan penanganan bug
          const handleDelete = async (row) => {
            if (window.confirm(`Yakin ingin menghapus ${row.nama || 'data ini'}?`)) {
              try {
                await window.firebaseDb.collection('guru').doc(row.id).delete();
                // Tidak perlu setGuruList lagi karena onSnapshot akan otomatis update (realtime)
              } catch (err) {
                console.error("Error menghapus dokumen: ", err);
                alert("Gagal menghapus data: " + err.message);
              }
            }
          };

                nama: "Guru Baru " + Math.floor(Math.random() * 1000),
                nip: "19800" + Math.floor(Math.random() * 100000),
                jabatan: "Guru Mapel",

             window.firebaseDb.collection('guru').add(dummyGuru)

            )},
          ];

          return (
            <div className="space-y-6 pb-20 lg:pb-0">
              <div className="flex items-center space-x-3">
                <button onClick={onBack} className="p-2 bg-white rounded-lg border border-gray-200 hover:bg-gray-50"><ArrowLeft size={20} className="text-gray-600" /></button>

                <div className="p-4 bg-red-50 text-red-700 rounded-xl border border-red-200 flex items-start space-x-3">
                   <Warning size={24} className="flex-shrink-0 mt-0.5" />

                     <p className="text-sm">{error}</p>

              {/* Tampilan Loading agar tidak terkesan freeze/buggy */}

                    <Activity size={40} className="text-green-500 animate-spin mb-4" />
                    <p className="text-gray-500 font-medium">Memuat data dari Firebase...</p>
                 </div>

                    {role === 'admin' && currentView === 'kesantrian' && <AdminKesantrianView setCurrentView={setCurrentView} />}
                    {role === 'admin' && currentView === 'hris' && <AdminHRISView setCurrentView={setCurrentView} />}
                    {role === 'admin' && currentView === 'data_guru' && <AdminDataGuru onBack={() => setCurrentView('akademik')} />}
                    {role === 'admin' && currentView === 'kaldik' && <AdminKaldik onBack={() => setCurrentView('akademik')} />}
                    
                    {/* Placeholder Untuk Modul Admin yang Belum Dibuat Sub-nya */}
                    {role === 'admin' && ['ekskul', 'ppdb', 'keuangan', 'laporan', 'pengaturan'].includes(currentView) && (
                       <div className="flex flex-col items-center justify-center h-64 text-gray-400">
                         <Settings size={64} className="mb-4 text-gray-300 animate-spin-slow" />
                         <h3 className="text-xl font-bold text-gray-600 mb-2">Modul {menus.find(m => m.id === currentView)?.label}</h3>
                         <p>Sub-menu dan fitur untuk modul ini sedang dalam tahap pengembangan.</p>
                       </div>
                    )}

                    {/* Routing Layar Role Lainnya */}
                    {role === 'yayasan' && currentView === 'dashboard' && <DashboardYayasan />}
                    {role === 'guru' && currentView === 'dashboard' && <DashboardGuru />}
                    {role === 'kesantrian' && currentView === 'dashboard' && <DashboardKesantrian />}
                    {role === 'musyrif' && currentView === 'dashboard' && <DashboardMusyrif />}
                    {role === 'website' && currentView === 'dashboard' && <DashboardWebsite />}
                    {role === 'leaderboard' && currentView === 'dashboard' && <DashboardLeaderboard />}

                    {/* Fallback View Untuk Role yang belum ada Dashboard Spesifiknya */}
                    {!['admin', 'yayasan', 'guru', 'kesantrian', 'musyrif', 'website', 'leaderboard'].includes(role) && currentView === 'dashboard' && (
                       <div className="flex flex-col items-center justify-center h-64 text-gray-400">
                         <Settings size={64} className="mb-4 text-gray-300 animate-spin-slow" />
                         <h3 className="text-xl font-bold text-gray-600 mb-2">Dashboard {roleName}</h3>
                         <p>Tampilan spesifik untuk role ini sedang dalam pengembangan purwarupa.</p>
                       </div>
                    )}

                  </div>
                </main>
              </div>

              {}
              <div className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex overflow-x-auto hide-scrollbar z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] px-2">
                {menus.map((menu, index) => (
                  <button 
                    key={index}
                    onClick={() => setCurrentView(menu.id)}
                    className={`min-w-[80px] flex-shrink-0 flex flex-col items-center justify-center py-3 px-2 ${currentView === menu.id || (menu.id === 'akademik' && currentView === 'data_guru') ? 'text-green-600 border-t-2 border-green-600 bg-green-50/50' : 'text-gray-400 hover:text-gray-600'}`}
                  >
                    <menu.icon size={24} className="mb-1" />
                    <span className="text-[10px] font-semibold whitespace-nowrap">{menu.label}</span>
                  </button>
                ))}
                <button 
                    onClick={() => setRole(null)}
                    className="min-w-[80px] flex-shrink-0 flex flex-col items-center justify-center py-3 px-2 text-red-400 hover:text-red-600"
                  >
                    <LogOut size={24} className="mb-1" />
                    <span className="text-[10px] font-semibold whitespace-nowrap">Keluar</span>
                </button>
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
