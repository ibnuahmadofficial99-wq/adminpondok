<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Untuk kompilasi JSX di dalam browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Phosphor Icons (Pengganti Lucide untuk Standalone HTML) -->

    <style>

</head>
<body class="bg-gray-50 m-0 p-0 font-sans">
    
    <!-- Wadah Aplikasi React -->
    <div id="root"></div>

    <script type="text/babel">
        // Import Hooks dari React Global
        const { useState, useEffect, useMemo } = React;
        
        // --- ICON MAPPER ---
        const createIcon = (baseClass) => ({ size = 24, className = '', color }) => {
            return <i className={`ph ${baseClass} ${className}`} style={{ fontSize: size, color, display: 'inline-block' }}></i>;
        };

        const Users = createIcon('ph-users');
        const Wallet = createIcon('ph-wallet');
        const BookOpen = createIcon('ph-book-open');
        const GraduationCap = createIcon('ph-graduation-cap');
        const Calendar = createIcon('ph-calendar');
        const Settings = createIcon('ph-gear');
        const LogOut = createIcon('ph-sign-out');
        const Menu = createIcon('ph-list');
        const X = createIcon('ph-x');
        const FileText = createIcon('ph-file-text');
        const CheckCircle = createIcon('ph-check-circle');
        const TrendingUp = createIcon('ph-trend-up');
        const LayoutDashboard = createIcon('ph-squares-four');
        const Clock = createIcon('ph-clock');
        const Award = createIcon('ph-medal');
        const BookMarked = createIcon('ph-bookmark-simple');
        const DollarSign = createIcon('ph-currency-dollar');
        const Activity = createIcon('ph-activity');
        const Globe = createIcon('ph-globe');
        const ArrowLeft = createIcon('ph-arrow-left');
        const Trophy = createIcon('ph-trophy');
        const Monitor = createIcon('ph-monitor');
        const Star = createIcon('ph-star');
        const Rss = createIcon('ph-rss');
        const CaretRight = createIcon('ph-caret-right');
        const MagnifyingGlass = createIcon('ph-magnifying-glass');
        const Plus = createIcon('ph-plus');
        const Pencil = createIcon('ph-pencil-simple');
        const Trash = createIcon('ph-trash');
        const CaretLeft = createIcon('ph-caret-left');
        const ShieldCheck = createIcon('ph-shield-check');
        const Moon = createIcon('ph-moon');
        const CheckSquare = createIcon('ph-check-square');

        // --- REUSABLE COMPONENTS ---
        const StatCard = ({ title, value, icon: Icon, color }) => (
          <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-100 flex items-center space-x-4 hover:shadow-md transition-shadow">
            <div className={`p-4 rounded-full text-white flex items-center justify-center ${color}`}>
              <Icon size={24} />
            </div>
            <div>
              <p className="text-sm text-gray-500 font-medium">{title}</p>
              <p className="text-2xl font-bold text-gray-800">{value}</p>
            </div>
          </div>
        );

        // --- COMPONENT: DATA GRID / TABLE (CRUD SIMULATOR) ---
        const DataGrid = ({ title, columns, data, onAdd, onEdit, onDelete }) => {
          const [searchQuery, setSearchQuery] = useState('');
          const [currentPage, setCurrentPage] = useState(1);
          const itemsPerPage = 5;

          // Filter Data
          const filteredData = useMemo(() => {
            return data.filter(item => 
              Object.values(item).some(val => 
                String(val).toLowerCase().includes(searchQuery.toLowerCase())
              )
            );
          }, [data, searchQuery]);

          // Pagination
          const totalPages = Math.ceil(filteredData.length / itemsPerPage);
          const paginatedData = filteredData.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

          return (
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              {/* Toolbar */}
              <div className="p-4 border-b border-gray-100 bg-gray-50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <h3 className="text-lg font-bold text-gray-800">{title}</h3>
                <div className="flex w-full sm:w-auto items-center gap-2">
                  <div className="relative flex-1 sm:flex-none">
                    <MagnifyingGlass size={18} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" />
                    <input 
                      type="text" 
                      placeholder="Cari data..." 
                      className="w-full sm:w-64 pl-9 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none"
                      value={searchQuery}
                      onChange={(e) => { setSearchQuery(e.target.value); setCurrentPage(1); }}
                    />
                  </div>
                  <button onClick={onAdd} className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center transition shadow-sm whitespace-nowrap">
                    <Plus size={16} className="mr-1 md:mr-2" /> <span className="hidden md:inline">Tambah Data</span>
                  </button>
                </div>
              </div>

              {/* Table */}
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse whitespace-nowrap">
                  <thead>
                    <tr className="bg-white border-b border-gray-200 text-gray-600 text-sm">
                      {columns.map((col, idx) => (
                        <th key={idx} className="p-4 font-semibold">{col.header}</th>
                      ))}
                      <th className="p-4 font-semibold text-right">Aksi</th>
                    </tr>
                  </thead>
                  <tbody className="text-sm">
                    {paginatedData.length > 0 ? paginatedData.map((row, idx) => (
                      <tr key={idx} className="hover:bg-gray-50 border-b border-gray-50 last:border-0 transition">
                        {columns.map((col, cIdx) => (
                          <td key={cIdx} className="p-4 text-gray-700">
                            {col.render ? col.render(row[col.accessor], row) : row[col.accessor]}
                          </td>
                        ))}
                        <td className="p-4 text-right space-x-2">
                          <button onClick={() => onEdit(row)} className="p-1.5 bg-blue-50 text-blue-600 rounded hover:bg-blue-100 transition" title="Edit">
                            <Pencil size={16} />
                          </button>
                          <button onClick={() => onDelete(row)} className="p-1.5 bg-red-50 text-red-600 rounded hover:bg-red-100 transition" title="Hapus">
                            <Trash size={16} />
                          </button>
                        </td>
                      </tr>
                    )) : (
                      <tr>
                        <td colSpan={columns.length + 1} className="p-8 text-center text-gray-500">
                          Data tidak ditemukan.
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>

              {/* Pagination */}
              <div className="p-4 border-t border-gray-100 bg-white flex justify-between items-center text-sm">
                <span className="text-gray-500">
                  Menampilkan {paginatedData.length > 0 ? ((currentPage - 1) * itemsPerPage) + 1 : 0} - {Math.min(currentPage * itemsPerPage, filteredData.length)} dari {filteredData.length} data
                </span>
                <div className="flex space-x-1">
                  <button 
                    disabled={currentPage === 1}
                    onClick={() => setCurrentPage(prev => prev - 1)}
                    className="p-1 rounded border border-gray-200 disabled:opacity-50 hover:bg-gray-50"
                  >
                    <CaretLeft size={16} />
                  </button>
                  <button 
                    disabled={currentPage === totalPages || totalPages === 0}
                    onClick={() => setCurrentPage(prev => prev + 1)}
                    className="p-1 rounded border border-gray-200 disabled:opacity-50 hover:bg-gray-50"
                  >
                    <CaretRight size={16} />
                  </button>
                </div>
              </div>
            </div>
          );
        };

        // --- DASHBOARD ADMIN & CRUD GURU ---

                <h2 className="text-2xl font-bold text-gray-800">Manajemen Data Guru</h2>
              </div>
              
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <StatCard title="Total Guru" value={guruList.length} icon={Users} color="bg-blue-500" />
                <StatCard title="Guru Aktif" value={guruList.filter(g => g.status === 'Aktif').length} icon={CheckCircle} color="bg-green-500" />
                <StatCard title="Sedang Cuti" value={guruList.filter(g => g.status === 'Cuti').length} icon={Clock} color="bg-yellow-500" />
              </div>

              <DataGrid

                onAdd={() => alert("Membuka form Tambah Guru Baru (CRUD - Create)")}
                onEdit={(row) => alert(`Membuka form Edit untuk: ${row.nama} (CRUD - Update)`)}
                onDelete={(row) => {
                  if(window.confirm(`Yakin ingin menghapus ${row.nama} dari sistem? (CRUD - Delete)`)) {
                    setGuruList(guruList.filter(g => g.id !== row.id));
                  }
                }}
              />
            </div>

        };

        // --- DASHBOARD LAINNYA ---
        const DashboardYayasan = () => (
          <div className="space-y-6 pb-20 lg:pb-0">
            <h2 className="text-2xl font-bold text-gray-800">Dashboard Ketua Yayasan</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
              <StatCard title="Total Santri" value="1,240" icon={Users} color="bg-blue-500" />
              <StatCard title="Total Guru & Karyawan" value="145" icon={CheckCircle} color="bg-green-500" />
              <StatCard title="Kas Yayasan" value="Rp 450 Juta" icon={Wallet} color="bg-emerald-600" />
              <StatCard title="Pertumbuhan Siswa" value="+5.4%" icon={TrendingUp} color="bg-purple-500" />
            </div>
          </div>
        );

        const DashboardGuru = () => (
          <div className="space-y-6 pb-20 lg:pb-0">
            <h2 className="text-2xl font-bold text-gray-800">Dashboard Guru / Ustadz</h2>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <StatCard title="Jadwal Hari Ini" value="4 Kelas" icon={Clock} color="bg-blue-500" />

        const DashboardKesantrian = () => (

              <StatCard title="Poin Prestasi" value="+120" icon={Trophy} color="bg-green-500" />

            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">

                    </div>

                 </div>
                 <div className="p-4 bg-green-50 rounded-lg border-l-4 border-green-500 flex justify-between items-center">
                    <div>
                      <p className="font-bold text-gray-800">Juara 1 Pidato B. Arab</p>
                      <p className="text-sm text-gray-500">Abdullah Azzam (VII-A) • Kemarin, 14:00 WIB</p>
                    </div>
                    <span className="bg-green-200 text-green-800 px-2 py-1 rounded text-xs font-bold">+50 Poin</span>

                <div className="grid grid-cols-2 gap-4">

        const DashboardLeaderboard = () => {
          const [time, setTime] = useState(new Date());
          const [announcementIdx, setAnnouncementIdx] = useState(0);

          const announcements = [
            "⭐ Selamat kepada ananda Abdullah Azzam atas pencapaian Hafalan 15 Juz bulan ini!",
            "📢 Pendaftaran Santri Baru Tahun Ajaran 2026/2027 Gelombang Kedua telah dibuka.",
            "🗓️ Kajian Rutin Wali Santri akan dilaksanakan pada hari Ahad, 17 Mei 2026."
          ];

          const topSantri = [
            { rank: 1, name: 'Abdullah Azzam', class: 'VIII-A', hafalan: '15 Juz', points: 950 },
            { rank: 2, name: 'Fatimah Az-Zahra', class: 'IX-B', hafalan: '14 Juz', points: 890 },
            { rank: 3, name: 'Umar Al-Faruq', class: 'VII-C', hafalan: '10 Juz', points: 720 },
            { rank: 4, name: 'Aisyah Humairah', class: 'VIII-B', hafalan: '9 Juz', points: 680 },
            { rank: 5, name: 'Ali bin Abi Thalib', class: 'VII-A', hafalan: '7 Juz', points: 540 },
          ];

          useEffect(() => {
            const timer = setInterval(() => setTime(new Date()), 1000);
            const ticker = setInterval(() => {
              setAnnouncementIdx((prev) => (prev + 1) % announcements.length);
            }, 6000); // Ganti pengumuman tiap 6 detik

            return () => {
              clearInterval(timer);
              clearInterval(ticker);
            };
          }, [announcements.length]);

          return (
            <div className="bg-gray-900 rounded-2xl shadow-2xl overflow-hidden text-white flex flex-col pb-20 lg:pb-0" style={{ minHeight: 'calc(100vh - 140px)' }}>
              {/* Header Layar TV */}
              <div className="bg-gray-800 p-6 flex justify-between items-center border-b border-gray-700">
                <div className="flex items-center space-x-4">
                  <div className="text-yellow-400"><Trophy size={40} /></div>
                  <div>
                    <h1 className="text-2xl font-black tracking-wider uppercase text-yellow-400">Leaderboard Tahfidz</h1>
                    <p className="text-gray-400 text-sm flex items-center">
                      <span className="w-2 h-2 bg-red-500 rounded-full animate-pulse mr-2"></span>
                      Live Update
                    </p>
                  </div>
                </div>
                <div className="text-right hidden md:block">
                  <h2 className="text-3xl font-bold font-mono">{time.toLocaleTimeString('id-ID')}</h2>
                  <p className="text-gray-400">{time.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                </div>
              </div>

              {/* Konten Utama */}
              <div className="flex-1 p-4 md:p-8 grid grid-cols-1 gap-4 overflow-y-auto">
                <div className="hidden md:flex justify-between text-gray-400 text-xs font-bold uppercase px-6 pb-2 border-b border-gray-700">
                  <div className="w-16">Peringkat</div>
                  <div className="flex-1">Nama Santri</div>
                  <div className="w-32 text-center">Kelas</div>
                  <div className="w-48 text-right">Capaian Hafalan</div>
                </div>
                
                {topSantri.map((santri) => (
                  <div key={santri.rank} className="bg-gray-800 rounded-xl p-4 md:p-6 flex items-center justify-between border border-gray-700 hover:border-yellow-500 hover:bg-gray-750 transition-all transform hover:scale-[1.01] shadow-lg">
                    <div className="w-12 md:w-16 flex justify-center">
                      {santri.rank === 1 ? <div className="bg-yellow-400 text-yellow-900 w-10 h-10 rounded-full flex items-center justify-center font-bold text-xl"><Star size={20} /></div> :
                       santri.rank === 2 ? <div className="bg-gray-300 text-gray-800 w-10 h-10 rounded-full flex items-center justify-center font-bold text-xl">2</div> :
                       santri.rank === 3 ? <div className="bg-amber-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-xl">3</div> :
                       <div className="text-gray-500 font-bold text-xl">{santri.rank}</div>}
                    </div>
                    <div className="flex-1 pl-2 md:pl-4">
                      <h3 className="text-lg md:text-2xl font-bold text-white">{santri.name}</h3>
                      <p className="text-xs md:text-sm text-yellow-500">{santri.points} Poin Mutaba'ah</p>
                    </div>
                    <div className="w-20 md:w-32 text-center">
                      <span className="bg-gray-700 px-2 py-1 md:px-3 md:py-1 rounded text-gray-300 font-medium text-xs md:text-sm">{santri.class}</span>
                    </div>
                    <div className="hidden md:block w-48 text-right">
                      <h4 className="text-2xl font-black text-green-400">{santri.hafalan}</h4>
                    </div>
                  </div>
                ))}
              </div>

              {/* Ticker / Running Text Area */}
              <div className="bg-green-700 text-white p-4 flex items-center">
                <div className="bg-green-900 px-4 py-1 rounded font-bold text-sm uppercase tracking-wider whitespace-nowrap z-10 mr-4">
                  Info Terkini
                </div>
                <div className="overflow-hidden flex-1 relative h-6">
                   <p className="absolute whitespace-nowrap animate-pulse font-medium">
                      {announcements[announcementIdx]}
                   </p>
                </div>
              </div>
            </div>
          );
        };

        // --- MAIN APP COMPONENT ---
        function App() {
          const [role, setRole] = useState(null);
          const [currentView, setCurrentView] = useState('dashboard');
          const [language, setLanguage] = useState('id');

          // Mapping Terjemahan
          const translations = {
            id: {
              title: 'SIMS Terpadu', subtitle: 'Pilih role untuk masuk ke prototipe',
              dashboard: 'Dashboard Utama',
              roles: { yayasan: 'Ketua Yayasan', kepsek: 'Kepala Sekolah', bendahara: 'Bendahara', admin: 'Administrator', kesantrian: 'Kepala Kesantrian', musyrif: 'Musyrif Asrama', guru: 'Guru / Ustadz', tahfidz: 'Pengampu Tahfidz', walisantri: 'Wali Santri', santri: 'Santri', website: 'Pengelola Website', leaderboard: 'Leaderboard Publik' }
            }
          };
          const t = translations['id'];

          // --- LOGIN SCREEN ---
          if (!role) {
            const roles = [
              { id: 'yayasan', name: t.roles.yayasan, icon: LayoutDashboard, color: 'bg-indigo-500' },
              { id: 'kepsek', name: t.roles.kepsek, icon: GraduationCap, color: 'bg-blue-500' },
              { id: 'bendahara', name: t.roles.bendahara, icon: Wallet, color: 'bg-emerald-500' },
              { id: 'admin', name: t.roles.admin, icon: Settings, color: 'bg-gray-700' },
              { id: 'kesantrian', name: t.roles.kesantrian, icon: ShieldCheck, color: 'bg-red-600' },
              { id: 'musyrif', name: t.roles.musyrif, icon: Moon, color: 'bg-sky-600' },
              { id: 'guru', name: t.roles.guru, icon: BookOpen, color: 'bg-teal-500' },
              { id: 'tahfidz', name: t.roles.tahfidz, icon: BookMarked, color: 'bg-green-600' },
              { id: 'walisantri', name: t.roles.walisantri, icon: Users, color: 'bg-orange-500' },
              { id: 'santri', name: t.roles.santri, icon: Award, color: 'bg-purple-500' },
              { id: 'website', name: t.roles.website, icon: Globe, color: 'bg-cyan-500' },
              { id: 'leaderboard', name: t.roles.leaderboard, icon: Trophy, color: 'bg-amber-500' }
            ];

            return (
              <div className="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative">
                <div className="sm:mx-auto sm:w-full sm:max-w-md text-center">
                  <div className="mx-auto h-16 w-16 text-green-600 flex items-center justify-center">
                     <GraduationCap size={64} />
                  </div>
                  <h2 className="mt-6 text-3xl font-extrabold text-gray-900">{t.title}</h2>
                  <p className="mt-2 text-sm text-gray-600">{t.subtitle}</p>
                </div>
                <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-3xl px-4">
                  <div className="bg-white py-8 px-4 shadow-xl rounded-2xl sm:px-10 border border-gray-100">
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                      {roles.map((r) => (
                        <button
                          key={r.id}
                          onClick={() => { setRole(r.id); setCurrentView('dashboard'); }}
                          className="flex flex-col items-center justify-center p-4 border rounded-xl hover:shadow-md transition-all hover:-translate-y-1 bg-white group"
                        >
                          <div className={`p-3 rounded-full text-white flex items-center justify-center ${r.color} mb-3 group-hover:scale-110 transition-transform`}>
                            <r.icon size={24} />
                          </div>
                          <span className="text-xs font-medium text-gray-700 text-center leading-tight">{r.name}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          // Konfigurasi Menu Sidebar & Bottom Nav
          const getMenus = () => {
            const commonMenus = [{ id: 'dashboard', icon: LayoutDashboard, label: 'Beranda' }];
            let specificMenus = [];
            switch(role) {
              case 'admin': specificMenus = [
                { id: 'akademik', icon: BookOpen, label: 'Akademik & Belajar' },
                { id: 'pengguna', icon: Users, label: 'Manajemen Pengguna' },
                { id: 'pengaturan', icon: Settings, label: 'Sistem SIMS' }
              ]; break;
              case 'kesantrian': specificMenus = [
                { id: 'pelanggaran', icon: ShieldCheck, label: 'Data Pelanggaran' },
                { id: 'perizinan', icon: FileText, label: 'Perizinan Santri' }
              ]; break;
              case 'musyrif': specificMenus = [
                { id: 'mutabaah', icon: Moon, label: 'Mutaba\'ah Ibadah' },
                { id: 'kebersihan', icon: CheckSquare, label: 'Kebersihan Kamar' },
                { id: 'kesehatan', icon: Activity, label: 'Kesehatan Santri' }
              ]; break;
              case 'guru': specificMenus = [{ id: 'jadwal', icon: Calendar, label: 'Jadwal' }, { id: 'presensi', icon: CheckCircle, label: 'Presensi' }, { id: 'nilai', icon: Award, label: 'Nilai' }]; break;
              case 'website': specificMenus = [{ id: 'berita', icon: Rss, label: 'Kelola Berita' }, { id: 'statistik', icon: Activity, label: 'Statistik Web' }]; break;
              case 'leaderboard': specificMenus = [{ id: 'pengaturan_layar', icon: Monitor, label: 'Pengaturan Layar' }]; break;
              default: specificMenus = [{ id: 'menu_lain', icon: FileText, label: 'Menu Lainnya' }]; break;
            }
            return [...commonMenus, ...specificMenus];
          };

          const menus = getMenus();
          const roleName = t.roles[role];

          return (
            <div className="flex h-screen bg-gray-50 overflow-hidden font-sans">
              
              {/* SIDEBAR (Desktop) - Disembunyikan di Mobile */}
              <aside className="hidden lg:flex flex-col w-64 bg-white shadow-xl z-30">
                <div className="flex items-center justify-center h-16 bg-green-600 text-white px-4">
                  <GraduationCap className="mr-2" size={24} />
                  <span className="text-xl font-bold truncate">SIMS Terpadu</span>
                </div>
                <div className="p-4 flex flex-col h-full overflow-y-auto">
                  <div className="mb-6 p-4 bg-gray-50 rounded-lg text-center">
                    <div className="w-16 h-16 bg-gray-200 rounded-full mx-auto mb-2 flex items-center justify-center text-gray-500 font-bold text-xl">
                      {roleName.charAt(0)}
                    </div>
                    <p className="font-bold text-gray-800">{roleName}</p>
                    <p className="text-xs text-green-600 font-medium">Online</p>
                  </div>
                  
                  <nav className="flex-1 space-y-1">
                    {menus.map((menu, index) => (
                      <a 
                        key={index} href="#" 
                        onClick={(e) => { e.preventDefault(); setCurrentView(menu.id); }}
                        className={`flex items-center px-4 py-3 text-sm font-medium rounded-lg transition-colors ${['dashboard', 'akademik'].includes(currentView) && currentView === menu.id ? 'bg-green-50 text-green-700' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'}`}
                      >
                        <menu.icon size={20} className={`mr-3 ${currentView === menu.id ? 'text-green-600' : 'text-gray-400'}`} />
                        {menu.label}
                      </a>
                    ))}
                  </nav>

                  <div className="mt-auto pt-4 border-t border-gray-200">
                    <button onClick={() => { setRole(null); setCurrentView('dashboard'); }} className="flex items-center w-full px-4 py-3 text-sm font-medium text-red-600 bg-red-50 rounded-lg hover:bg-red-100 transition-colors">
                      <LogOut className="mr-3" size={20} /> Keluar
                    </button>
                  </div>
                </div>
              </aside>

              {/* AREA UTAMA KONTEN */}
              <div className="flex-1 flex flex-col h-screen overflow-hidden">
                {/* Header Atas */}
                <header className="flex items-center justify-between h-16 bg-white shadow-sm border-b border-gray-200 px-4 sm:px-6 lg:px-8 z-10">
                  <div className="flex items-center">
                    <div className="lg:hidden flex items-center text-green-600 font-bold text-lg">
                      <GraduationCap className="mr-2" size={24} /> SIMS Mobile
                    </div>
                    <button onClick={() => { setRole(null); setCurrentView('dashboard'); }} className="hidden lg:flex items-center text-gray-600 hover:text-gray-900 ml-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition border border-transparent hover:border-gray-200">
                      <ArrowLeft size={18} className="mr-2" /> <span className="text-sm font-medium">Kembali / Ganti Role</span>
                    </button>
                  </div>
                  <div className="flex items-center space-x-4">
                    <div className="h-8 w-8 rounded-full bg-green-600 flex items-center justify-center text-white font-bold text-sm lg:hidden">
                      {roleName.charAt(0)}
                    </div>
                  </div>
                </header>

                <main className="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-4 sm:p-6 lg:p-8">
                  <div className="max-w-7xl mx-auto h-full">
                    
                    {/* Routing View Sederhana */}
                    {role === 'admin' && currentView === 'dashboard' && <DashboardAdmin setCurrentView={setCurrentView} />}
                    {role === 'admin' && currentView === 'akademik' && <DashboardAdmin setCurrentView={setCurrentView} />}
                    {role === 'admin' && currentView === 'data_guru' && <AdminDataGuru onBack={() => setCurrentView('akademik')} />}
                    
                    {role === 'yayasan' && currentView === 'dashboard' && <DashboardYayasan />}
                    {role === 'guru' && currentView === 'dashboard' && <DashboardGuru />}
                    {role === 'kesantrian' && currentView === 'dashboard' && <DashboardKesantrian />}
                    {role === 'musyrif' && currentView === 'dashboard' && <DashboardMusyrif />}
                    {role === 'website' && currentView === 'dashboard' && <DashboardWebsite />}
                    {role === 'leaderboard' && currentView === 'dashboard' && <DashboardLeaderboard />}

                    {/* Fallback View */}
                    {['admin', 'kesantrian', 'musyrif', 'guru', 'website'].includes(role) && !['dashboard', 'akademik', 'data_guru'].includes(currentView) && (
                      <div className="flex items-center justify-center h-64 text-gray-500 flex-col pb-20 lg:pb-0">
                        <Settings size={48} className="mb-4 text-gray-300" />
                        <p>Menu <b>{currentView.replace('_', ' ').toUpperCase()}</b> sedang dalam pengembangan.</p>
                        {role === 'admin' && <button onClick={() => setCurrentView('akademik')} className="mt-4 text-blue-600 hover:underline">Kembali ke Akademik</button>}
                      </div>
                    )}

                  </div>
                </main>
              </div>

              {/* NAVIGATION BAR BAWAH (MOBILE ONLY) - Bisa Digeser (Scrollable) */}
              <div className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex overflow-x-auto hide-scrollbar z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] px-2">
                {menus.map((menu, index) => (
                  <button 
                    key={index}
                    onClick={() => setCurrentView(menu.id)}
                    className={`min-w-[80px] flex-shrink-0 flex flex-col items-center justify-center py-3 px-2 ${currentView === menu.id || (menu.id === 'akademik' && currentView === 'data_guru') ? 'text-green-600 border-t-2 border-green-600 bg-green-50/50' : 'text-gray-400 hover:text-gray-600'}`}
                  >
                    <menu.icon size={24} className="mb-1" />
                    <span className="text-[10px] font-semibold whitespace-nowrap">{menu.label}</span>
                  </button>
                ))}
                {/* Tombol Logout Tambahan di Mobile */}
                <button 
                    onClick={() => setRole(null)}
                    className="min-w-[80px] flex-shrink-0 flex flex-col items-center justify-center py-3 px-2 text-red-400 hover:text-red-600"
                  >
                    <LogOut size={24} className="mb-1" />
                    <span className="text-[10px] font-semibold whitespace-nowrap">Keluar</span>
                </button>
              </div>

            </div>
          );
        }

        // Render Aplikasi
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
